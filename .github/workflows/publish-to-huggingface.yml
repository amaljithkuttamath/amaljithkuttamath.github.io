name: Publish Model to HuggingFace

on:
  # Trigger manually when model is ready
  workflow_dispatch:
    inputs:
      model_path:
        description: "Path to model artifacts (e.g. projects/train-qwen-opus-distill/output)"
        required: true
        default: "projects/train-qwen-opus-distill/output"
      hf_repo:
        description: "HuggingFace repo (e.g. amaljithkuttamath/Qwen3.5-27B-Opus-Distilled)"
        required: true
      upload_gguf:
        description: "Also upload GGUF quantizations"
        type: boolean
        default: true

  # Auto-trigger when a release is tagged
  push:
    tags:
      - "model-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Login to HuggingFace
        run: huggingface-cli login --token ${{ secrets.HF_TOKEN }}

      - name: Create HuggingFace repo
        run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          repo_id = '${{ github.event.inputs.hf_repo || env.HF_REPO }}'
          api.create_repo(repo_id, exist_ok=True, repo_type='model')
          print(f'Repo ready: https://huggingface.co/{repo_id}')
          "

      - name: Upload model card
        run: |
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          repo_id = '${{ github.event.inputs.hf_repo || env.HF_REPO }}'
          api.upload_file(
              path_or_fileobj='projects/train-qwen-opus-distill/MODEL_CARD.md',
              path_in_repo='README.md',
              repo_id=repo_id,
              repo_type='model',
          )
          "

      - name: Upload LoRA adapters
        run: |
          MODEL_PATH="${{ github.event.inputs.model_path || 'projects/train-qwen-opus-distill/output' }}"
          if [ -d "${MODEL_PATH}/lora" ]; then
            python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          repo_id = '${{ github.event.inputs.hf_repo || env.HF_REPO }}'
          api.upload_folder(
              folder_path='${MODEL_PATH}/lora',
              path_in_repo='lora',
              repo_id=repo_id,
              repo_type='model',
          )
          print('LoRA adapters uploaded.')
            "
          fi

      - name: Upload merged model
        run: |
          MODEL_PATH="${{ github.event.inputs.model_path || 'projects/train-qwen-opus-distill/output' }}"
          if [ -d "${MODEL_PATH}/merged-16bit" ]; then
            python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          repo_id = '${{ github.event.inputs.hf_repo || env.HF_REPO }}'
          api.upload_folder(
              folder_path='${MODEL_PATH}/merged-16bit',
              repo_id=repo_id,
              repo_type='model',
          )
          print('Merged model uploaded.')
            "
          fi

      - name: Upload GGUF quantizations
        if: ${{ github.event.inputs.upload_gguf == 'true' || github.event_name == 'push' }}
        run: |
          MODEL_PATH="${{ github.event.inputs.model_path || 'projects/train-qwen-opus-distill/output' }}"
          HF_REPO="${{ github.event.inputs.hf_repo || env.HF_REPO }}"

          # Create separate GGUF repo
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          gguf_repo = '${HF_REPO}-GGUF'
          api.create_repo(gguf_repo, exist_ok=True, repo_type='model')
          "

          for quant_dir in ${MODEL_PATH}/gguf-*; do
            if [ -d "$quant_dir" ]; then
              quant_name=$(basename "$quant_dir")
              python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          gguf_repo = '${HF_REPO}-GGUF'
          api.upload_folder(
              folder_path='${quant_dir}',
              path_in_repo='${quant_name}',
              repo_id=gguf_repo,
              repo_type='model',
          )
          print(f'Uploaded ${quant_name}')
              "
            fi
          done

      - name: Post summary
        run: |
          HF_REPO="${{ github.event.inputs.hf_repo || env.HF_REPO }}"
          echo "## Published to HuggingFace" >> $GITHUB_STEP_SUMMARY
          echo "- Model: https://huggingface.co/${HF_REPO}" >> $GITHUB_STEP_SUMMARY
          echo "- GGUF: https://huggingface.co/${HF_REPO}-GGUF" >> $GITHUB_STEP_SUMMARY
